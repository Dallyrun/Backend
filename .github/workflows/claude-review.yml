name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          prompt: |
            이 PR 을 Dallyrun Backend (Spring Boot / Java 17 / Gradle) 프로젝트 관점에서 리뷰하세요.

            저장소의 `.claude/commands/review-pr.md` 에 정의된 체크리스트와 카테고리를 따르세요.

            핵심 확인 항목:
            - **계층 책임**: Controller 는 HTTP 처리·검증만, 비즈니스 로직은 Service, JPA 접근은 Repository
            - **견고성**: `Optional.get()` 남용, 빈 catch, `@Valid` 누락, N+1, 트랜잭션 경계
            - **에러 처리**: `BusinessException(ErrorCode.*)` 사용, `RuntimeException` 직접 throw 금지
            - **보안**: 하드코딩 시크릿, SQL 인젝션, 민감 정보 응답 노출, 인가 누락
            - **테스트**: 신규/변경 로직의 테스트 유무, 정상 + 예외 케이스
            - **API 설계**: `record` DTO, `ApiResponse<T>` 래핑, SpringDoc 주석

            리뷰 규칙:
            - 인라인 코멘트는 `[카테고리]` 접두어를 붙이세요 (Bug / Security / Layer / Error Handling / Performance / Test / Style / Suggestion / Nit / Question).
            - 문제가 없으면 승인, 개선 제안만 있으면 코멘트, 버그/보안 이슈가 있으면 변경 요청을 남기세요.
            - 한국어로 작성하세요.
            - 리뷰 본문 어디에도 Claude/AI 관련 언급은 넣지 마세요.
