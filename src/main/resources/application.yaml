spring:
  application:
    name: dallyrun-backend

  # 루트의 .env 파일을 선택적으로 로드 (로컬 개발용). 운영은 환경변수로 주입.
  config:
    import: optional:file:./.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  tomcat:
    accesslog:
      enabled: true
      directory: /dev
      prefix: stdout
      suffix: ""
      file-date-format: ""
      rotate: false
      buffered: false
      pattern: '%t %a "%r" %s %b %D ms'

storage:
  local:
    path: ${STORAGE_LOCAL_PATH:./uploads}
  base-url: ${STORAGE_BASE_URL:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000
  refresh-token-expiry: 1209600000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

share:
  ttl-days: ${SHARE_TTL_DAYS:30}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
